<html>
<head>
<title>Sign Up</title>
<link rel="stylesheet" type="text/css" href="css/login.css">
</head>
<body>
	<div class="container">
	<div class="logo">
		<div class="card">
			<div class="inner-box">
				<div class="card-front">
				<h2>Sign Up</h2>
				<form>
					<input type="Text" class="input-box" placeholder="Name" required>
					<input type="email" class="input-box" placeholder="Enter your email id" required>
					<input type="password" class="input-box" placeholder="Password" required>
					<input type="password" class="input-box" placeholder="Confirm Password" required>
					<button type="submit" class="submit-btn">Login</button>
					<input type="checkbox"><span>Remember Me</span>
				
				</form>
				<a href="login.html">
				<button type="button" class="btn">Already have an account?</button>
				</a>
			
				</div>
			</div>
		</div>
	</div>

</body>
</html>
