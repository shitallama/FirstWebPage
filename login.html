<html>
<head>
<title>Login</title>
<link rel="stylesheet" type="text/css" href="css/login.css">
</head>
<body>
	<div class="container">
		<div class="card">
			<div class="inner-box">
				<div class="card-front">
				<h2>Login</h2>
				<form>
					<input type="email" class="input-box" placeholder="Enter your email id" required>
					<input type="password" class="input-box" placeholder="Enter your password" required>
					<button type="submit" class="submit-btn">Login</button>
					<input type="checkbox"><span>Remember Me</span>
				</form>
				<a href="Signup.html">
				<button type="button" class="btn">Don't have an account?</button>
				</a>
				<a href="#">Forgot Password?</a>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
